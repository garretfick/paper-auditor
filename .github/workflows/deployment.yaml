name: deployment

on:
  workflow_dispatch:
    inputs:
      dryrun:
        type: boolean
        required: true
        default: true
  schedule:
    - cron: '0 19 * * 1'

# The version partial pushes a commit + tag and creates a GitHub Release;
# the package partial uploads platform artifacts + sha256 sidecars to that
# Release. A reusable workflow cannot exceed the caller's GITHUB_TOKEN
# permissions, so contents: write must be granted here.
permissions:
  contents: write

jobs:
  version:
    uses: ./.github/workflows/partial_version.yaml
    with:
      dryrun: ${{ github.event_name == 'workflow_dispatch' && inputs.dryrun || false }}
    secrets: inherit

  build:
    needs: version
    uses: ./.github/workflows/partial_build.yaml

  package:
    needs: [version, build]
    uses: ./.github/workflows/partial_package.yaml
    with:
      version: ${{ needs.version.outputs.version }}
      gh-release-tag: ${{ needs.version.outputs.gh-release-tag }}
      dryrun: ${{ github.event_name == 'workflow_dispatch' && inputs.dryrun || false }}
    secrets: inherit
