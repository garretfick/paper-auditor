name: partial-package

on:
  workflow_call:
    inputs:
      version:
        type: string
        required: true
      gh-release-tag:
        type: string
        required: true
      dryrun:
        type: boolean
        required: true

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-linux
            ext: tar.gz
          - runner: macos-15-intel
            target: x86_64-darwin
            ext: tar.gz
          - runner: macos-latest
            target: aarch64-darwin
            ext: tar.gz
          - runner: windows-latest
            target: x86_64-windows
            ext: zip
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - run: corepack enable

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Package
        shell: bash
        run: just package "${{ inputs.version }}" "paper-auditor-${{ inputs.version }}-${{ matrix.target }}.${{ matrix.ext }}"

      - name: Generate sha256 sidecar
        shell: bash
        run: |
          artifact="paper-auditor-${{ inputs.version }}-${{ matrix.target }}.${{ matrix.ext }}"
          shasum -a 256 "$artifact" > "$artifact.sha256"

      - if: ${{ !inputs.dryrun }}
        name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          artifact="paper-auditor-${{ inputs.version }}-${{ matrix.target }}.${{ matrix.ext }}"
          gh release upload "${{ inputs.gh-release-tag }}" "$artifact" "$artifact.sha256"
