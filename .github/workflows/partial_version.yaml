name: partial-version

on:
  workflow_call:
    inputs:
      dryrun:
        type: boolean
        required: true
    outputs:
      version:
        description: The next semantic version (e.g. 0.3.0)
        value: ${{ jobs.version.outputs.version }}
      commit-tag:
        description: The git tag created (e.g. v0.3.0); empty in dryrun
        value: ${{ jobs.version.outputs.commit-tag }}
      gh-release-id:
        description: The GitHub Release id; empty in dryrun
        value: ${{ jobs.version.outputs.gh-release-id }}
      gh-release-tag:
        description: The GitHub Release tag (e.g. v0.3.0); empty in dryrun
        value: ${{ jobs.version.outputs.gh-release-tag }}

jobs:
  version:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    outputs:
      version: ${{ steps.compute.outputs.version }}
      commit-tag: ${{ steps.outputs.outputs.commit-tag }}
      gh-release-id: ${{ steps.outputs.outputs.gh-release-id }}
      gh-release-tag: ${{ steps.outputs.outputs.gh-release-tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.PAPER_AUDITOR_WORKFLOW_PUBLISH_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - run: corepack enable

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - id: compute
        run: echo "version=$(just get-next-version)" >> "$GITHUB_OUTPUT"

      - if: ${{ !inputs.dryrun }}
        run: just version "${{ steps.compute.outputs.version }}"

      - if: ${{ !inputs.dryrun }}
        run: just commit-version "Continuous Integration" "ci@paper-auditor.local" "${{ steps.compute.outputs.version }}"

      - if: ${{ !inputs.dryrun }}
        run: git push origin HEAD --follow-tags

      - if: ${{ !inputs.dryrun }}
        id: publish
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: v${{ steps.compute.outputs.version }}
          name: v${{ steps.compute.outputs.version }}
          body: Automated release v${{ steps.compute.outputs.version }}
          draft: false
          prerelease: true

      - if: ${{ !inputs.dryrun }}
        id: outputs
        run: |
          {
            echo "commit-tag=v${{ steps.compute.outputs.version }}"
            echo "gh-release-id=${{ steps.publish.outputs.id }}"
            echo "gh-release-tag=v${{ steps.compute.outputs.version }}"
          } >> "$GITHUB_OUTPUT"
